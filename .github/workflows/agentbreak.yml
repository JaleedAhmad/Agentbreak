# This workflow runs AgentBreak on every PR and push to main. 
# Remove it or adjust the schema path for your own repo.

name: "Security Scan"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Run AgentBreak Scan
        uses: ./
        with:
          schema: examples/email_agent.yaml
          fail-on: high
