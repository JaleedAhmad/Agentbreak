meta:
  name: "Email assistant agent"
  framework: "langgraph"
  description: >
    A LangGraph agent that reads emails, summarises them, drafts replies,
    and can search the web for context.  Classic Lethal Trifecta scenario:
    external input (inbox), LLM processing, and outbound action (send reply).

tools:
  - name: fetch_emails
    description: "Fetches unread emails from Gmail via IMAP. Returns raw email bodies."
    input_trust: external
    sinks: []

  - name: web_search
    description: "Searches the web for context on a topic. Returns scraped page content."
    input_trust: external
    sinks: []

  - name: summarise_and_plan
    description: >
      LLM node that reads email content and web search results, then decides
      what action to take: reply, forward, archive, or search for more info.
    input_trust: untrusted
    sinks: []

  - name: draft_reply
    description: "Generates a reply email body using the LLM based on the plan."
    input_trust: untrusted
    sinks: []

  - name: send_email
    description: "Sends the drafted reply via SMTP. Irreversible action."
    input_trust: trusted
    sinks:
      - email_send

  - name: save_to_notes
    description: "Saves a summary of the email thread to a local Markdown file."
    input_trust: trusted
    sinks:
      - file_write

edges:
  - source: fetch_emails
    target: summarise_and_plan
    label: "raw email body (untrusted content from internet)"

  - source: web_search
    target: summarise_and_plan
    label: "scraped web content (untrusted content from internet)"

  - source: summarise_and_plan
    target: draft_reply
    label: "action plan from LLM"

  - source: summarise_and_plan
    target: save_to_notes
    label: "summary text"

  - source: draft_reply
    target: send_email
    label: "email body text"
